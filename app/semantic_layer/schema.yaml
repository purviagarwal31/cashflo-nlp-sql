tables:
  invoices:
    description: "Invoices received from vendors"
    synonyms: ["bills", "payables"]
    columns:
      id: {type: int}
      vendor_id: {type: int}
      company_id: {type: int}
      po_id: {type: int}
      grand_total: {type: float, desc: "Total invoice amount including tax"}
      status:
        type: enum
        values: ["received", "validated", "approved", "rejected", "on_hold", "paid"]
      invoice_date: {type: date}

  vendors:
    description: "Vendor or supplier information"
    synonyms: ["suppliers"]
    columns:
      id: {type: int}
      name: {type: text}
      is_watchlisted: {type: boolean}
      rating: {type: float}

  purchase_orders:
    description: "Purchase orders created by company"
    columns:
      id: {type: int}
      vendor_id: {type: int}
      department_id: {type: int}
      po_date: {type: date}
      total_amount: {type: float}

  departments:
    description: "Company departments"
    columns:
      id: {type: int}
      name: {type: text}
      company_id: {type: int}

relationships:
  - {from: invoices.vendor_id, to: vendors.id}
  - {from: invoices.po_id, to: purchase_orders.id}
  - {from: purchase_orders.department_id, to: departments.id}

metrics:
  revenue:
    description: "Total revenue from paid invoices"
    sql: "SUM(invoices.grand_total) WHERE invoices.status = 'paid'"

  outstanding:
    description: "Total unpaid invoices"
    sql: "SUM(invoices.grand_total) WHERE invoices.status IN ('approved','validated','on_hold')"

  invoice_count:
    description: "Total number of invoices"
    sql: "COUNT(invoices.id)"